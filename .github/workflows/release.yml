name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            archive: mdit-linux-amd64.tar.gz
          - os: windows-latest
            platform: windows-amd64
            archive: mdit-windows-amd64.zip
          - os: macos-latest
            platform: macos
            archive: mdit-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build application
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            wails build -clean -tags webkit2_41
          else
            wails build -clean
          fi

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          mkdir -p dist/linux-portable
          cp build/bin/mdit dist/linux-portable/mdit
          cp build/appicon.png dist/linux-portable/appicon.png
          cp packaging/linux/mdit.desktop dist/linux-portable/mdit.desktop
          cp packaging/linux/run-mdit.sh dist/linux-portable/run-mdit.sh
          chmod +x dist/linux-portable/mdit
          chmod +x dist/linux-portable/run-mdit.sh
          tar -C dist/linux-portable -czf "dist/${{ matrix.archive }}" .

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          tar -C build/bin -czf "dist/${{ matrix.archive }}" .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path build/bin/* -DestinationPath dist/${{ matrix.archive }} -Force

      - name: Upload build archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
